name: Desktop CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always

jobs:
  check:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4

      - name: Install system deps (Tauri v2)
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            libwebkit2gtk-4.1-dev \
            libssl-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            libasound2-dev

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy

      - name: Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      # ---------- Rust backend ----------

      - name: cargo check
        working-directory: src-tauri
        run: cargo check

      - name: cargo clippy
        working-directory: src-tauri
        run: cargo clippy -- -D warnings

      - name: cargo test
        working-directory: src-tauri
        run: cargo test

      # ---------- Frontend ----------

      - uses: pnpm/action-setup@v4
        with:
          version: latest

      - name: Use Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: pnpm install
        run: pnpm install --frozen-lockfile

      - name: pnpm check (svelte-check)
        run: pnpm check

      - name: pnpm build (vite)
        run: pnpm build
